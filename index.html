<html lang="zh-TW"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', -apple-system, sans-serif; background: #FBF8F4; color: #1a1a1a; min-height: 100vh; }

  /* ── Navigation ── */
  .nav {
    background: #E8761A;
    padding: 0; display: flex; align-items: stretch;
    box-shadow: 0 2px 12px rgba(232,118,26,0.25);
    position: sticky; top: 0; z-index: 50;
  }
  .nav-brand { color: white; font-size: 15px; font-weight: 700; padding: 14px 18px; letter-spacing: 0.03em; display: flex; align-items: center; gap: 7px; }
  .nav-tabs { display: flex; margin-left: auto; }
  .nav-tab { color: rgba(255,255,255,0.75); font-size: 13px; padding: 0 14px; display: flex; align-items: center; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.15s; font-weight: 500; }
  .nav-tab:hover { color: white; background: rgba(255,255,255,0.12); }
  .nav-tab.active { color: white; border-bottom-color: white; }
  .logout-btn { font-size: 12px; color: rgba(255,255,255,0.65); cursor: pointer; padding: 0 14px; display: flex; align-items: center; border-left: 1px solid rgba(255,255,255,0.2); }
  .logout-btn:hover { color: white; }

  /* ── Stats bar ── */
  .stats-bar { background: #FFFFFF; border-bottom: 1px solid #f2ede8; padding: 9px 14px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; position: sticky; top: 41px; z-index: 49; box-shadow: 0 1px 4px rgba(0,0,0,0.03); }
  .stats-slime { width: 30px; height: 30px; object-fit: contain; flex-shrink: 0; }
  .stats-item { display: flex; align-items: baseline; gap: 5px; font-size: 12px; color: #999; }
  .stats-item b { font-size: 15px; color: #E8761A; font-weight: 700; }
  .stats-item span.val { font-size: 13px; color: #1a1a1a; font-weight: 600; }
  .stats-refresh { margin-left: auto; width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid #f0ece6; background: white; color: #E8761A; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .stats-refresh:hover { background: #FEF0E3; border-color: #E8761A; }
  .stats-refresh.spinning { animation: spin 0.7s linear; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ── Pages ── */
  .page { display: none; padding: 20px 16px; max-width: 700px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── Cards ── */
  .card { background: white; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.07); overflow: hidden; margin-bottom: 16px; }
  .card-header { background: #E8761A; color: white; padding: 13px 18px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .card-body { padding: 18px; }
  .section-label { font-size: 11px; font-weight: 700; color: #E8761A; text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 13px; }
  .field { margin-bottom: 15px; }
  .field label { font-size: 12px; color: #666; display: block; margin-bottom: 5px; font-weight: 500; }
  .field input, .field select, .field textarea { width: 100%; padding: 10px 13px; border: 1.5px solid #e8e8e8; border-radius: 10px; font-size: 14px; color: #1a1a1a; background: white; outline: none; transition: border 0.15s; font-family: inherit; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #E8761A; }
  .field input[readonly] { background: #f8f6f3; color: #777; cursor: default; }
  .field textarea { resize: vertical; min-height: 82px; }
  .field .hint { font-size: 11px; color: #bbb; margin-top: 4px; }
  .divider { height: 1px; background: #f2ede8; margin: 16px 0; }

  /* ── Location type buttons ── */
  .loc-type-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .loc-type-btn { flex: 1; min-width: 70px; padding: 9px 6px; border: 1.5px solid #e8e8e8; border-radius: 10px; background: white; font-size: 13px; cursor: pointer; color: #666; transition: all 0.15s; text-align: center; font-family: inherit; font-weight: 500; }
  .loc-type-btn.active { background: #E8761A; color: white; border-color: #E8761A; }
  .loc-type-btn:hover:not(.active) { border-color: #E8761A; color: #E8761A; }

  /* ── Buttons ── */
  .btn-primary { width: 100%; padding: 13px; background: #E8761A; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: inherit; box-shadow: 0 4px 12px rgba(232,118,26,0.3); }
  .btn-primary:hover { background: #d06815; }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

  /* ── Lock ── */
  .lock-overlay { display:flex; align-items:center; justify-content:center; min-height:260px; }
  .lock-box { background:white; border-radius:18px; box-shadow:0 4px 24px rgba(0,0,0,0.1); padding:32px 28px; width:100%; max-width:320px; text-align:center; }
  .lock-icon { font-size:36px; margin-bottom:12px; }
  .lock-title { font-size:16px; font-weight:700; color:#1a1a1a; margin-bottom:6px; }
  .lock-sub { font-size:12px; color:#bbb; margin-bottom:18px; }
  .lock-input { width:100%; padding:11px 14px; border:1.5px solid #e8e8e8; border-radius:10px; font-size:18px; text-align:center; letter-spacing:0.2em; outline:none; color:#1a1a1a; font-family:inherit; }
  .lock-input:focus { border-color:#E8761A; }
  .lock-btn { width:100%; margin-top:12px; padding:12px; background:#E8761A; color:white; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; box-shadow:0 4px 12px rgba(232,118,26,0.3); }
  .lock-btn:hover { background:#d06815; }
  .lock-err { font-size:12px; color:#e05252; margin-top:8px; min-height:18px; }

  /* ── Toast ── */
  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:#1a1a1a; color:white; padding:11px 22px; border-radius:10px; font-size:13px; opacity:0; pointer-events:none; transition:opacity 0.3s; z-index:200; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,0.2); }
  .toast.show { opacity:1; }

  /* ── Filters ── */
  .filter-row { display:flex; gap:8px; margin-bottom:12px; }
  .filter-btn { flex:1; padding:9px 4px; border:1.5px solid #e8e8e8; border-radius:10px; background:white; font-size:13px; cursor:pointer; color:#666; transition:all 0.15s; font-family:inherit; font-weight:500; }
  .filter-btn.active { background:#E8761A; color:white; border-color:#E8761A; }
  .filter-btn:hover:not(.active) { border-color:#E8761A; color:#E8761A; }
  .dash-select { font-size:12px; padding:6px 10px; border:1.5px solid #e8e8e8; border-radius:8px; color:#444; background:white; outline:none; font-family:inherit; }
  .dash-select:focus { border-color:#E8761A; }

  /* ── Pagination ── */
  .pagination { display:flex; justify-content:center; align-items:center; gap:5px; margin-top:14px; flex-wrap:wrap; }
  .page-btn { padding:7px 12px; border:1.5px solid #e8e8e8; border-radius:8px; background:white; font-size:13px; cursor:pointer; color:#666; transition:all 0.15s; font-family:inherit; }
  .page-btn.active { background:#E8761A; color:white; border-color:#E8761A; }
  .page-btn:hover:not(.active):not(:disabled) { border-color:#E8761A; color:#E8761A; }
  .page-btn:disabled { opacity:0.35; cursor:not-allowed; }
  .page-ellipsis { font-size:13px; color:#bbb; padding:0 4px; }

  /* ── Case cards ── */
  .case-card { background:white; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,0.06); padding:15px; margin-bottom:11px; position:relative; }
  .case-card.area-館 { background:#FDEBD0; }
  .case-card.area-雅 { background:#DDE9F7; }
  .case-card.area-研 { background:#D5EDD9; }
  .case-card.area-智 { background:#E8E3F0; }
  .case-card.area-其 { background:#EBEBEB; }
  #caseList { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  #caseList .case-card { margin-bottom:0; }
  #caseList .case-card.expanded-card { grid-column: 1 / -1; }
  @media (max-width:700px) { #caseList { grid-template-columns:1fr; } }
  .case-card.is-closed { background:#f8f6f3; }
  .case-card.is-flagged { background:#f5f5f5; opacity:0.72; }
  .case-card.is-flagged .case-title,
  .case-card.is-flagged .case-desc { text-decoration:line-through; color:#bbb; }
  .flag-stamp {
    position:absolute; top:16px; right:16px;
    border:3px solid #C0392B; border-radius:6px;
    color:#C0392B; font-size:15px; font-weight:900;
    padding:4px 10px; letter-spacing:3px;
    transform:rotate(-12deg); transform-origin:center;
    opacity:0.75; pointer-events:none; white-space:nowrap;
    font-family:inherit; line-height:1.4;
  }
  .case-collapsed { cursor:pointer; border-radius:10px; transition:background 0.15s; margin:-4px; padding:4px; }
  .case-collapsed:hover { background:#faf8f5; }
  .case-tap-hint { font-size:11px; color:#ccc; text-align:center; margin-top:10px; padding-top:8px; border-top:1px dashed #f0ece6; }

  /* ── 案件詳情 Side Panel ── */
  #caseDetailPanel {
    position:fixed; top:0; right:0; bottom:0; width:390px;
    background:white; box-shadow:-4px 0 24px rgba(0,0,0,0.15);
    z-index:400; transform:translateX(100%);
    transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);
    display:flex; flex-direction:column; overflow:hidden;
  }
  #caseDetailPanel.open { transform:translateX(0); }
  .panel-header {
    background:var(--navy,#1A3A5C); color:white;
    padding:16px 18px; display:flex; justify-content:space-between; align-items:center;
    flex-shrink:0;
  }
  .panel-body { flex:1; overflow-y:auto; padding:16px; }
  .panel-section { margin-bottom:14px; }
  .panel-label { font-size:11px; color:#bbb; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
  .panel-value { font-size:14px; color:#333; }
  .panel-divider { border:none; border-top:1px solid #f0ece6; margin:12px 0; }
  .drill-row-clickable { cursor:pointer; transition:background 0.15s; }
  .drill-row-clickable:hover { background:#faf0e8; }
  @media (max-width:600px) {
    #caseDetailPanel { width:100%; top:auto; height:80vh; border-radius:18px 18px 0 0;
      transform:translateY(100%); box-shadow:0 -4px 24px rgba(0,0,0,0.15); }
    #caseDetailPanel.open { transform:translateY(0); }
  }
  .case-expand-header { display:flex; justify-content:space-between; align-items:flex-start; cursor:pointer; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #f2ede8; transition:opacity 0.15s; }
  .case-expand-header:hover { opacity:0.6; }
  .collapse-hint { font-size:11px; color:#bbb; white-space:nowrap; padding-top:2px; }
  .case-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
  .case-id { font-size:11px; color:#bbb; font-weight:500; }
  .case-title { font-size:15px; font-weight:600; color:#1a1a1a; margin:3px 0 4px; }
  .case-meta { font-size:12px; color:#aaa; margin-bottom:9px; }
  .case-desc { font-size:13px; color:#555; background:#faf8f5; border-radius:8px; padding:9px 11px; margin-bottom:11px; border-left:3px solid #E8761A; }
  .badge { font-size:11px; padding:4px 11px; border-radius:20px; font-weight:600; white-space:nowrap; }
  .ppt-btn { font-size:11px; padding:5px 10px; border-radius:8px; font-weight:600; white-space:nowrap; background:#4A90D9; color:white; border:none; cursor:pointer; font-family:inherit; }
  .ppt-btn:disabled { opacity:0.6; cursor:default; }
  .badge.pending { background:#FEF0E3; color:#C05E0A; }
  .badge.done { background:#E6F4EA; color:#2D7A3E; }
  .badge.flagged { background:#f0f0f0; color:#999; }

  /* ── Mgr fields ── */
  .mgr-field { margin-bottom:10px; }
  .mgr-label { font-size:11px; color:#aaa; display:flex; align-items:center; gap:5px; margin-bottom:5px; font-weight:500; }
  .opt-tag { font-size:10px; color:#bbb; background:#f2f2f2; padding:1px 6px; border-radius:4px; }
  .tooltip-wrap { position:relative; display:inline-flex; }
  .tooltip-icon { font-size:12px; color:#ccc; cursor:default; }
  .tooltip-wrap:hover .tooltip-box { display:block; }
  .tooltip-box { display:none; position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:#333; color:white; font-size:11px; padding:5px 9px; border-radius:6px; white-space:nowrap; z-index:10; pointer-events:none; }
  .mgr-field textarea, .mgr-field input[type=text] { width:100%; padding:8px 11px; border:1.5px solid #e8e8e8; border-radius:9px; font-size:13px; outline:none; font-family:inherit; color:#1a1a1a; background:white; }
  .mgr-field textarea { min-height:62px; resize:vertical; }
  .mgr-field textarea:focus, .mgr-field input[type=text]:focus { border-color:#E8761A; }

  /* ── Flag buttons ── */
  .flag-row { display:flex; gap:6px; flex-wrap:wrap; }
  .flag-btn { padding:5px 12px; border:1.5px solid #ccc; border-radius:20px; background:white; font-size:12px; cursor:pointer; color:#555; transition:all 0.15s; font-family:inherit; font-weight:500; }
  .flag-btn.active-flag { background:#E8761A; color:white; border-color:#E8761A; font-weight:600; }
  .flag-btn:hover:not(.active-flag) { border-color:#E8761A; color:#E8761A; }

  .btn-row { display:flex; gap:8px; margin-top:10px; }
  .btn-save { flex:1; padding:9px; background:#E8761A; color:white; border:none; border-radius:9px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-save:hover { background:#d06815; }
  .btn-close-case { flex:1; padding:9px; background:#2D7A3E; color:white; border:none; border-radius:9px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-close-case:hover { background:#246332; }
  .btn-reopen { flex:1; padding:9px; background:#f0f0f0; color:#666; border:none; border-radius:9px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-reopen:hover { background:#e5e5e5; }

  /* ── Dashboard ── */
  .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:14px; }
  .stat-card { background:white; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,0.06); padding:16px; text-align:center; position:relative; overflow:hidden; border-left:4px solid transparent; }
  .stat-card.tint-navy { background:linear-gradient(135deg,#fbfcfe 0%,#eef3f8 100%); border-left-color:#1a3a5c; }
  .stat-card.tint-red { background:linear-gradient(135deg,#fffbfa 0%,#fdecea 100%); border-left-color:#E0524D; }
  .stat-card.tint-green { background:linear-gradient(135deg,#fafdfb 0%,#e9f5ed 100%); border-left-color:#2D7A3E; }
  .stat-num { font-size:28px; font-weight:700; }
  .stat-num.orange { color:#E8761A; }
  .stat-num.green { color:#2D7A3E; }
  .stat-num.navy { color:#1a3a5c; }
  .stat-num.gray { color:#aaa; }
  .stat-num.red { color:#E0524D; }
  .stat-card.rate-card {
    background: linear-gradient(135deg, #E8761A 0%, #F4A24A 100%);
    box-shadow: 0 6px 20px rgba(232,118,26,0.35);
    border-left: none;
    transform: scale(1.03);
  }
  .stat-card.rate-card::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
  }
  .stat-card.rate-card::after {
    content: '';
    position: absolute;
    bottom: -25px; left: -25px;
    width: 70px; height: 70px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
  }
  .stat-card.rate-card .stat-num { color: white; position: relative; z-index: 1; font-size: 34px; }
  .stat-card.rate-card .stat-label { color: rgba(255,255,255,0.9); position: relative; z-index: 1; font-weight:600; }
  .stat-label { font-size:12px; color:#bbb; margin-top:4px; font-weight:500; }
  .chart-wrap { background:white; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,0.06); padding:18px; margin-bottom:14px; }
  .chart-title { font-size:13px; font-weight:700; margin-bottom:14px; color:#1a1a1a; }
  .bar-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:12px; }
  .bar-label { width:54px; color:#666; text-align:right; flex-shrink:0; }
  .bar-track { flex:1; background:#f2ede8; border-radius:5px; height:16px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:5px; transition:width 0.5s ease; min-width:4px; }
  .bar-val { width:28px; color:#444; font-weight:600; }

  /* ── Time filter ── */
  .time-filter-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .time-btn { padding:7px 13px; border:1.5px solid #e8e8e8; border-radius:20px; background:white; font-size:12px; cursor:pointer; color:#666; transition:all 0.15s; font-family:inherit; font-weight:500; }
  .time-btn.active { background:#E8761A; color:white; border-color:#E8761A; }
  .time-btn:hover:not(.active) { border-color:#E8761A; color:#E8761A; }
  .custom-range { display:flex; gap:8px; align-items:center; margin-bottom:14px; }
  .custom-range input { padding:7px 10px; border:1.5px solid #e8e8e8; border-radius:9px; font-size:12px; color:#444; outline:none; font-family:inherit; }
  .custom-range input:focus { border-color:#E8761A; }
  .custom-range span { font-size:12px; color:#aaa; }

  /* ── Loc table ── */
  .loc-entry { margin-bottom:13px; padding-bottom:13px; border-bottom:1px solid #f2ede8; }
  .loc-entry:last-child { border-bottom:none; margin-bottom:0; padding-bottom:0; }
  .loc-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
  .loc-name { font-size:13px; font-weight:600; color:#1a1a1a; }
  .loc-area-tag { font-size:11px; color:#888; margin-left:6px; }
  .loc-badges { display:flex; gap:5px; flex-shrink:0; }
  .lb-p { font-size:11px; padding:2px 8px; border-radius:20px; background:#FEF0E3; color:#C05E0A; font-weight:600; }
  .lb-d { font-size:11px; padding:2px 8px; border-radius:20px; background:#E6F4EA; color:#2D7A3E; font-weight:600; }

  /* ── Recent ── */
  .recent-item { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #f2ede8; font-size:13px; }
  .recent-item:last-child { border-bottom:none; }

  /* ── Public query ── */
  .pub-card { background:white; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,0.06); padding:14px; margin-bottom:10px; }
  .pub-card.is-flagged { background:#f5f5f5; opacity:0.65; }
  .pub-card.is-flagged .pub-title,
  .pub-card.is-flagged .pub-desc { text-decoration:line-through; color:#bbb; }
  .pub-title { font-size:14px; font-weight:600; color:#1a1a1a; margin:3px 0 3px; }
  .pub-meta { font-size:12px; color:#bbb; margin-bottom:8px; }
  .pub-desc { font-size:13px; color:#666; background:#faf8f5; border-radius:8px; padding:8px 11px; border-left:3px solid #E8761A; }
  .pub-note { font-size:13px; color:#246332; margin-top:11px; background:#EEF7F0; border-radius:8px; padding:10px 12px; border-left:3px solid #2D7A3E; line-height:1.5; }
  .pub-note-label { font-size:11px; color:#2D7A3E; font-weight:700; margin-bottom:3px; display:flex; align-items:center; gap:5px; }

  .empty-state { text-align:center; color:#ccc; padding:40px 0; font-size:14px; }

  /* ── Photo Upload ── */
  .photo-upload-area { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
  .photo-slot { width:80px; height:80px; border:1.5px dashed #e8e8e8; border-radius:10px; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; overflow:hidden; background:#faf8f5; transition:border 0.15s; flex-shrink:0; }
  .photo-slot:hover { border-color:#E8761A; }

// ── 位置標準化 ──
function normalizeLocation(raw) {
  if (!raw) return '';
  raw = String(raw);
  if (!raw.trim()) return '';
  let s = raw.trim();
  s = s.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  const cnMap = {'零':0,'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9};
  s = s.replace(/[一二三四五六七八九零十百]+/g, m => {
    let n = 0;
    if (m.includes('十')) {
      const parts = m.split('十');
      const left = parts[0] ? parts[0].split('').reduce((a,c)=>a*10+(cnMap[c]??0),0) : 1;
      const right = parts[1] ? parts[1].split('').reduce((a,c)=>a*10+(cnMap[c]??0),0) : 0;
      n = left*10 + right;
    } else {
      n = m.split('').reduce((a,c)=>a*10+(cnMap[c]??0),0);
    }
    return n>0 ? String(n) : m;
  });
  s = s.replace(/(\d+)\s*[樓层F]/g, '$1F');
  s = s.replace(/走道|廊道|通道/g, '走廊');
  s = s.replace(/厅/g, '廳');
  s = s.replace(/(\d+)\s*[號号]\s*[房室間]?/g, '$1');
  s = s.replace(/(\d+)\s*[室房間]/g, '$1');
  s = s.replace(/[、，,。.]\s*$/, '');
  s = s.replace(/\s+/g, ' ').trim();
  return s;
}

function showNormPreview() {
  const raw = document.getElementById('f-location').value;
  const norm = normalizeLocation(raw);
  const preview = document.getElementById('normPreview');
  if (norm && norm !== raw.trim()) {
    document.getElementById('normValue').textContent = norm;
    preview.style.display = 'block';
  } else { preview.style.display = 'none'; }
}

  let filtered = allCases.filter(c=>c.status===currentFilter);
  if (currentMgrArea!=='all') filtered=filtered.filter(c=>areaMatchesFilter(effArea(c),currentMgrArea));
  const mgrSearchKeyword = (document.getElementById('mgrSearchInput')?.value || '').trim().toLowerCase();
  if (mgrSearchKeyword) {
    filtered = filtered.filter(c => {
      const haystack = [
        c.caseId, c.area, effArea(c), c.location, c.normalizedLocation,
        c.description, c.name, c.unit, c.locationType, c.caseType, c.repairNote
      ].filter(Boolean).join(' ').toLowerCase();
      return haystack.includes(mgrSearchKeyword);
    });
  }
  if (currentFilter==='已結案') {
    const toTs = (c) => {
      const raw = c.closeDatetime || c.datetime || c.date || '';
      if (!raw) return 0;
      const s = String(raw).trim();
      // ISO 格式 (含 T 或 Z) 直接解析，不做斜線替換
      if (/T.*Z?$|^\d{4}-\d{2}-\d{2}T/.test(s)) {
        const d = new Date(s);
        return isNaN(d) ? 0 : d.getTime();
      }
      const d = new Date(s.replace(/-/g,'/'));
      return isNaN(d) ? 0 : d.getTime();
    };
    filtered = [...filtered].sort((a,b)=> toTs(b) - toTs(a));
  }
  if (!filtered.length) { list.innerHTML='<div class="empty-state">目前沒有案件</div>'; document.getElementById('mgrPagination').innerHTML=''; return; }
  const totalPages = Math.ceil(filtered.length/PAGE_SIZE);
  if (mgrPage>totalPages) mgrPage=totalPages;
  const paged = filtered.slice((mgrPage-1)*PAGE_SIZE, mgrPage*PAGE_SIZE);

  list.innerHTML = paged.map(c => {
    const isFlagged = !!c.flagReason;
    const area = effArea(c);
    const areaClass = area.startsWith('會館') ? 'area-館' : area.startsWith('雅舍') ? 'area-雅' : area.startsWith('研究') ? 'area-研' : area.startsWith('智尊') ? 'area-智' : 'area-其';
    const cls = (isFlagged ? 'case-card is-flagged' : currentFilter==='已結案' ? 'case-card is-closed' : 'case-card') + ' ' + areaClass;
    const locDisplay = c.normalizedLocation || c.location || '—';
    const titleHtml = `${c.area} · ${locDisplay}${c.locationType ? ' <span style="font-size:11px;background:#FEF0E3;color:#C05E0A;padding:2px 8px;border-radius:20px;font-weight:600;">'+c.locationType+'</span>' : ''}`;
    const badgeHtml = `<span class="badge ${isFlagged?'flagged':c.status==='待處理'?'pending':'done'}">${isFlagged?'已標記':c.status}</span>`;
    const photosHtml = `
      ${c.reportPhotos&&c.reportPhotos.length?`<div style="margin-top:8px;font-size:11px;color:#aaa;">報修照片：</div><div class="photo-preview-wrap">${c.reportPhotos.map(url=>`<img class="photo-preview-img" src="${url}" onclick="event.stopPropagation();window.open('${url}')">`).join('')}</div>`:''}
      ${c.closePhotos&&c.closePhotos.length?`<div style="margin-top:8px;font-size:11px;color:#aaa;">結案照片：</div><div class="photo-preview-wrap">${c.closePhotos.map(url=>`<img class="photo-preview-img" src="${url}" onclick="event.stopPropagation();window.open('${url}')">`).join('')}</div>`:''}
    `;
    const timeBadges = `${dateBadge('📝報修', c.datetime||c.date, '#FEF0E3', '#C05E0A')}${c.status==='已結案'?dateBadge('✅結案', c.closeDatetime, '#E6F4EA', '#1E7A3E'):''}`;

    const reportBtnHtml = (c.status==='已結案' && !isFlagged) ? `<button class="ppt-btn" onclick="event.stopPropagation();generateReport(${c.rowIndex},this)">📊 生成報告</button>` : '';

    const stampHtml = isFlagged ? `<div class="flag-stamp">${c.flagReason||'已標記'}</div>` : '';

    const collapsedView = `
      <div class="case-collapsed" id="collapsed-${c.rowIndex}" onclick="toggleCardEdit(${c.rowIndex})">
        ${stampHtml}
        <div class="case-top">
          <div>
            <div class="case-id">${c.caseId}</div>
            <div style="margin:4px 0;">${timeBadges}</div>
            <div class="case-title">${titleHtml}</div>
            <div class="case-meta">${c.unit} · ${c.name}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            ${badgeHtml}
            ${reportBtnHtml}
          </div>
        </div>
        <div class="case-desc">${c.description}</div>
        ${c.repairNote?`<div class="pub-note"><div class="pub-note-label">✅ 處理結果</div>${c.repairNote}</div>`:''}

      </div>`;

    const expandedView = `
      <div class="case-expanded" id="expanded-${c.rowIndex}" style="display:none">
        <div class="case-expand-header" onclick="toggleCardEdit(${c.rowIndex})">
          <div>
            <div class="case-id">${c.caseId}</div>
            <div style="margin:4px 0;">${timeBadges}</div>

            <div class="case-meta">${c.unit} · ${c.name}</div>
          </div>

            ${badgeHtml}
            ${reportBtnHtml}
            <span class="collapse-hint">收合 ▴</span>
          </div>
        </div>
      <div class="case-desc">${c.description}</div>
      <div class="mgr-field">
        <div class="mgr-label">案件類型 <span style="font-size:10px;color:#e05252;background:#fdecea;padding:1px 6px;border-radius:4px;">必填</span></div>
        <div class="flag-row" id="ctype-${c.rowIndex}">
          ${['給排水','電力','消防','空調','弱電','電梯','建物','木工','鐵工','照明','衛浴','庶務','其他'].map(f=>`<button class="flag-btn${normalizeCaseType(c.caseType).startsWith(f)?' active-flag':''}" onclick="toggleCaseType(${c.rowIndex},'${f}',this)">${f}</button>`).join('')}

          value="${c.caseType&&c.caseType.startsWith('其他')?c.caseType.replace('其他：',''):''}">
      </div>
      <div class="mgr-field">
        <div class="mgr-label">更正區域 <span class="opt-tag">選填</span></div>
        <div class="flag-row" id="carea-${c.rowIndex}">
          ${['會館','雅舍一棟','雅舍二棟','雅舍三棟','研究園','智尊','其他'].map(f=>{

              return `<button class="flag-btn${isActive?' active-flag':''}" style="${style}" onclick="toggleLocType(${c.rowIndex},'${matchVal}',this)" title="${isOriginal?'報修人原始值，點擊確認更正':''}">${label}</button>`;

        <div class="flag-row" id="closer-${c.rowIndex}">
          ${['林益程','劉奕錦','余冠魁','鄭嘉榮','高賓瞬','其他'].map(f=>{
            const fixedNames = ['林益程','劉奕錦','余冠魁','鄭嘉榮','高賓瞬'];
            const savedNames = (c.closerName||'').split('、');

            return `<button class="flag-btn${isActive?' active-flag':''}" data-closer="${f}" onclick="toggleCloser(${c.rowIndex},'${f}',this)">${f}</button>`;
          }).join('')}
        </div>
        <input type="text" id="closer-other-${c.rowIndex}" placeholder="請輸入結案人姓名"
          style="display:${c.closerName&&!['林益程','劉奕錦','余冠魁','鄭嘉榮','高賓瞬'].includes(c.closerName)&&c.closerName?'block':'none'};margin-top:6px;width:100%;padding:7px 11px;border:1.5px solid #e8e8e8;border-radius:9px;font-size:13px;font-family:inherit;outline:none;"
          value="${c.closerName&&!['林益程','劉奕錦','余冠魁','鄭嘉榮','高賓瞬'].includes(c.closerName)?c.closerName:''}">
      </div>
      <div class="mgr-field">
        <div class="mgr-label">維修記錄</div>
        <textarea id="note-${c.rowIndex}" placeholder="填寫處理情形…">${c.repairNote||''}</textarea>
      </div>
      <div class="mgr-field">
        <div class="mgr-label">結案照片 <span class="opt-tag">選填，最多 2 張</span></div>

          </div>
          <div class="photo-slot" onclick="triggerPhotoUpload('close-${c.rowIndex}',1)" id="close-slot-${c.rowIndex}-1">
            ${c.closePhotos&&c.closePhotos[1]?`<img src="${c.closePhotos[1]}"><div class="photo-del" onclick="event.stopPropagation();removePhoto('close-${c.rowIndex}',1)">×</div>`:'<span class="photo-add">+</span>'}
          </div>
        </div>
        <input type="file" id="close-file-${c.rowIndex}-0" accept="image/*" style="display:none" onchange="handlePhotoUpload('close-${c.rowIndex}',0,this)">
        <input type="file" id="close-file-${c.rowIndex}-1" accept="image/*" style="display:none" onchange="handlePhotoUpload('close-${c.rowIndex}',1,this)">
        ${c.reportPhotos&&c.reportPhotos.length?`<div style="margin-top:8px;font-size:11px;color:#aaa;">報修照片：</div><div class="photo-preview-wrap">${c.reportPhotos.map((url,idx)=>`<div style="position:relative;display:inline-block;"><img class="photo-preview-img" src="${url}" onclick="window.open('${url}')"><div class="photo-del" onclick="event.stopPropagation();deleteReportPhoto(${c.rowIndex},${idx})">×</div></div>`).join('')}</div>`:''}
      </div>
      <div class="mgr-field">
        <div class="mgr-label">標記原因 <span class="opt-tag">選填，標記後不列入病歷表統計</span></div>
        <div class="flag-row" id="flags-${c.rowIndex}">
          ${['寫錯','重複報修','測試'].map(f=>`<button class="flag-btn${c.flagReason===f?' active-flag':''}" onclick="toggleFlag(${c.rowIndex},'${f}',this)">${f}</button>`).join('')}
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-save" onclick="updateCase(${c.rowIndex})">更新案件狀況</button>
        ${c.status==='待處理'
          ? `<button class="btn-close-case" onclick="closeCase(${c.rowIndex})">結案</button>`
          : `<button class="btn-reopen" onclick="reopenCase(${c.rowIndex})">取消結案</button>`}
      </div>
      </div>`;

    return `<div class="${cls}">${collapsedView}${expandedView}</div>`;
  }).join('');

  renderPagination('mgrPagination', mgrPage, totalPages, p=>{mgrPage=p;renderCases();});
}

function toggleCardEdit(rowIndex) {
  const collapsed = document.getElementById('collapsed-'+rowIndex);
  const expanded = document.getElementById('expanded-'+rowIndex);
  if (!collapsed || !expanded) return;
  const card = collapsed.closest('.case-card');
  if (expanded.style.display === 'none') {
    collapsed.style.display = 'none';
    expanded.style.display = 'block';
    if (card) card.classList.add('expanded-card');
  } else {
    collapsed.style.display = 'block';
    expanded.style.display = 'none';
    if (card) card.classList.remove('expanded-card');
  }
}

function toggleArea(rowIndex, area, btn) {
  const btns = document.getElementById('carea-'+rowIndex).querySelectorAll('.flag-btn');
  const wasActive = btn.classList.contains('active-flag');
  btns.forEach(b=>b.classList.remove('active-flag'));
  if (!wasActive) btn.classList.add('active-flag');
}

function getSelectedArea(rowIndex) {
  const el = document.getElementById('carea-'+rowIndex);
  if (!el) return '';
  const active = el.querySelector('.active-flag');
  return active ? active.textContent : '';
}

function toggleLocType(rowIndex, type, btn) {
  const btns = document.getElementById('ltype-'+rowIndex).querySelectorAll('.flag-btn');
  const wasActive = btn.classList.contains('active-flag');
  btns.forEach(b=>b.classList.remove('active-flag'));
  if (!wasActive) btn.classList.add('active-flag');
}

function getSelectedLocType(rowIndex) {
  const el = document.getElementById('ltype-'+rowIndex);
  if (!el) return '';
  const active = el.querySelector('.active-flag');
  return active ? active.textContent : '';
}

function toggleCaseType(rowIndex, type, btn) {
  const btns = document.getElementById('ctype-'+rowIndex).querySelectorAll('.flag-btn');
  btns.forEach(b=>b.classList.remove('active-flag'));
  btn.classList.add('active-flag');
  const otherInput = document.getElementById('ctype-other-'+rowIndex);
  if (otherInput) otherInput.style.display = type==='其他' ? 'block' : 'none';
}

function getSelectedCaseType(rowIndex) {
  const el = document.getElementById('ctype-'+rowIndex);
  if (!el) return '';
  const active = el.querySelector('.active-flag');
  if (!active) return '';
  const type = active.textContent;
  if (type === '其他') {
    const otherInput = document.getElementById('ctype-other-'+rowIndex);
    const otherVal = otherInput ? otherInput.value.trim() : '';
    return otherVal ? '其他：' + otherVal : '其他';
  }
  return type;
}

function toggleCloser(rowIndex, name, btn) {
  btn.classList.toggle('active-flag');
  const otherInput = document.getElementById('closer-other-'+rowIndex);
  if (otherInput) {
    const otherBtn = document.getElementById('closer-'+rowIndex).querySelector('[data-closer="其他"]');
    otherInput.style.display = (otherBtn && otherBtn.classList.contains('active-flag')) ? 'block' : 'none';
  }
}

function getSelectedCloser(rowIndex) {
  const el = document.getElementById('closer-'+rowIndex);
  if (!el) return '';
  const fixedNames = ['林益程','劉奕錦','余冠魁','鄭嘉榮','高賓瞬'];
  const selected = [];
  el.querySelectorAll('.flag-btn.active-flag').forEach(b => {
    if (b.textContent === '其他') {
      const input = document.getElementById('closer-other-'+rowIndex);
      const val = input ? input.value.trim() : '';
      if (val) selected.push(val);
    } else {
      selected.push(b.textContent);
    }
  });
  return selected.join('、');
}

function toggleFlag(rowIndex, reason, btn) {
  const btns = document.getElementById('flags-'+rowIndex).querySelectorAll('.flag-btn');
  const wasActive = btn.classList.contains('active-flag');
  btns.forEach(b=>b.classList.remove('active-flag'));
  if (!wasActive) {
    btn.classList.add('active-flag');
    autoCloseAsFlagged(rowIndex, reason);
  }
}

async function autoCloseAsFlagged(rowIndex, reason) {
  const labels = {重複報修:'重複報修', 寫錯:'填寫錯誤', 測試:'測試案件'};
  const label = labels[reason] || reason;
  if (!confirm(`確定標記為「${label}」並自動結案？此案件將移至已結案，不列入統計。`)) {
    const btns = document.getElementById('flags-'+rowIndex)?.querySelectorAll('.flag-btn');
    if (btns) btns.forEach(b=>b.classList.remove('active-flag'));
    return;
  }
  try {
    const data = await callApi({
      action: 'close',
      rowIndex,
      repairNote: '',
      normalizedLocation: '',
      flagReason: reason,
      caseType: '',
      correctedLocType: '',
      correctedArea: '',
      closerName: '',
      closePhotos: [],
      closeFingerprint: getDeviceFingerprint()
    });
    if (data.success) {
      showToast(`✓ 已標記「${label}」並結案`);
      await loadCases();
    } else {
      showToast('操作失敗：'+(data.message||'未知錯誤'));
    }
  } catch(e) {
    showToast('操作失敗，請檢查網路');
  }
}

function getSelectedFlag(rowIndex) {
  const el = document.getElementById('flags-'+rowIndex);
  if (!el) return '';
  const active = el.querySelector('.active-flag');
  return active ? active.textContent : '';
}

async function updateCase(rowIndex) {
  const note = document.getElementById('note-'+rowIndex).value;
  const norm = document.getElementById('norm-'+rowIndex).value;
  const flag = getSelectedFlag(rowIndex);
  const caseType = getSelectedCaseType(rowIndex);
  const correctedLocType = getSelectedLocType(rowIndex);
  const correctedArea = getSelectedArea(rowIndex);
  const closerName = getSelectedCloser(rowIndex);
  const closePhotos = getClosePhotos(rowIndex);
  const btn = document.querySelector(`[onclick="updateCase(${rowIndex})"]`);
  if (btn) { btn.disabled=true; btn.textContent='更新中…'; }
  try {
    const data = await callApi({action:'update', rowIndex, repairNote:note, normalizedLocation:norm, flagReason:flag, caseType, correctedLocType, correctedArea, closerName, closePhotos});
    if (data && data.success) { showToast('✓ 已更新案件狀況'); loadCases(); }
    else { showToast('❌ 更新失敗，請重試'); }
  } catch(e) { showToast('❌ 連線失敗，請檢查網路'); }
  if (btn) { btn.disabled=false; btn.textContent='更新案件狀況'; }
}
async function closeCase(rowIndex) {
  const note = document.getElementById('note-'+rowIndex).value;
  const norm = document.getElementById('norm-'+rowIndex).value;
  const flag = getSelectedFlag(rowIndex);
  const caseType = getSelectedCaseType(rowIndex);
  if (!caseType) { showToast('請選擇案件類型'); return; }
  const correctedLocType = getSelectedLocType(rowIndex);
  const correctedArea = getSelectedArea(rowIndex);
  const closerName = getSelectedCloser(rowIndex);
  if (!closerName) { showToast('請選擇結案人'); return; }
  const closePhotos = getClosePhotos(rowIndex);
  const btn = document.querySelector(`[onclick="closeCase(${rowIndex})"]`);
  if (btn) { btn.disabled=true; btn.textContent='處理中…'; }
  try {
    const data = await callApi({action:'close', rowIndex, repairNote:note, normalizedLocation:norm, flagReason:flag, caseType, correctedLocType, correctedArea, closerName, closePhotos, closeFingerprint: getDeviceFingerprint()});
    if (data && data.success) { showToast('✓ 案件已結案'); loadCases(); }
    else { showToast('❌ 結案失敗，請重試'); }
  } catch(e) { showToast('❌ 連線失敗，請檢查網路'); }
  if (btn) { btn.disabled=false; btn.textContent='結案'; }
}
async function reopenCase(rowIndex) {
  const btn = document.querySelector(`[onclick="reopenCase(${rowIndex})"]`);
  if (btn) { btn.disabled=true; btn.textContent='處理中…'; }
  try {
    const data = await callApi({action:'reopen', rowIndex});
    if (data && data.success) { showToast('✓ 已取消結案'); loadCases(); }
    else { showToast('❌ 操作失敗，請重試'); }
  } catch(e) { showToast('❌ 連線失敗，請檢查網路'); }
  if (btn) { btn.disabled=false; btn.textContent='取消結案'; }
}
async function callApi(params) {
  const token = sessionStorage.getItem('adminToken');
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({ ...params, token })
  });
  return res.json();
}

// ── 案件查詢（公開）──
let gmMode = false;

let currentQueryName = '';
let currentQueryStatusFilter = 'all';

async function searchByName() {
  const input = document.getElementById('query-name-input').value.trim();
  if (!input) { showToast('請輸入姓名'); return; }
  if (input === 'GM123') {
    enterGmMode();
    return;
  }
  if (!allCases.length) await loadCases();
  currentQueryName = input;
  currentQueryStatusFilter = '待處理';
  document.querySelectorAll('#query-status-filter .filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('#query-status-filter .filter-btn').classList.add('active');
  document.getElementById('query-status-filter').style.display = 'block';
  queryPage = 1;
  renderQueryByName(input);
}

function filterQueryStatus(status, btn) {
  currentQueryStatusFilter = status;
  queryPage = 1;
  document.querySelectorAll('#query-status-filter .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderQueryByName(currentQueryName);
}

function enterGmMode() {
  gmMode = true;

// ── 分頁 ──
function renderPagination(containerId, current, total, onChange) {
  const el = document.getElementById(containerId);
  if (total<=1) { el.innerHTML=''; return; }
  let html = `<button class="page-btn" ${current===1?'disabled':''} onclick="paginationGo('${containerId}',${current-1})">‹</button>`;
  for (let i=1; i<=total; i++) {
    if (total>7 && i>2 && i<total-1 && Math.abs(i-current)>1) {
      if (i===3||i===total-2) html+=`<span class="page-ellipsis">…</span>`;
      continue;
    }
    html+=`<button class="page-btn${i===current?' active':''}" onclick="paginationGo('${containerId}',${i})">${i}</button>`;
  }
  html+=`<button class="page-btn" ${current===total?'disabled':''} onclick="paginationGo('${containerId}',${current+1})">›</button>`;
  el.innerHTML=html;
  el._onChange = onChange;
}

function paginationGo(containerId, page) {
  const el = document.getElementById(containerId);
  if (el && el._onChange) {
    el._onChange(page);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function formatDatetime(raw) {
  if (!raw) return '';
  const weekdays = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  // Try to parse
  const m = String(raw).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) {
    const d = new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
    const day = weekdays[d.getDay()];
    return `${m[1]}/${String(m[2]).padStart(2,'0')}/${String(m[3]).padStart(2,'0')} ${day}`;
  }
  // GMT string fallback
  const d = new Date(raw);
  if (!isNaN(d)) {
    const y = d.getFullYear();
    const mo = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const day = weekdays[d.getDay()];
    return `${y}/${mo}/${dd} ${day}`;
  }
  return raw;
}

function dateBadge(label, dateStr, bg, color) {
  if (!dateStr) return '';
  return `<span style="display:inline-flex;align-items:center;gap:4px;background:${bg};color:${color};font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;margin-right:6px;">${label} ${formatDatetime(dateStr)}</span>`;
}

function parseDate(raw) {
  if (!raw) return null;
  const m1 = String(raw).match(/(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
  if (m1) return new Date(parseInt(m1[1]), parseInt(m1[2])-1, parseInt(m1[3]));
  const d = new Date(raw);
  return isNaN(d) ? null : d;
}

function getFilteredCases() {
  const now = new Date();
  let valid = allCases.filter(c=>!c.flagReason);
  if (currentAreaDashFilter!=='all') valid = valid.filter(c=>areaMatchesFilter(effArea(c),currentAreaDashFilter));
  if (currentTimeFilter==='all') return valid;
  return valid.filter(c=>{
    const raw = c.datetime||c.date||'';
    const d = parseDate(raw);
    if (!d) return true;
    const mMatch = currentTimeFilter.match(/^m(\d+)$/);
    if (mMatch) {
      const m = parseInt(mMatch[1]);
      return d.getFullYear()===currentYear && d.getMonth()+1===m;
    }
    if (currentTimeFilter==='custom') {
      const from=document.getElementById('dateFrom').value;
      const to=document.getElementById('dateTo').value;
      if (from&&d<new Date(from)) return false;
      if (to&&d>new Date(to+'T23:59:59')) return false;
      return true;
    }
    return true;
  });
}

// ── 圓餅圖 ──
function renderPieChart(containerId, counts, colors, total, clickHandler) {
  const el = document.getElementById(containerId);
  const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  if (!entries.length) { el.innerHTML='<div class="empty-state" style="padding:20px 0;">暫無資料</div>'; return; }
  const sum = entries.reduce((a,b)=>a+b[1],0);
  const size = 160;
  const cx = size/2, cy = size/2, r = 68, innerR = 36;
  let startAngle = -Math.PI/2;
  let slices = '';
  entries.forEach(([label, val]) => {
    const angle = (val/sum)*Math.PI*2;
    const endAngle = startAngle + angle;
    const x1=cx+r*Math.cos(startAngle), y1=cy+r*Math.sin(startAngle);
    const x2=cx+r*Math.cos(endAngle), y2=cy+r*Math.sin(endAngle);
    const ix1=cx+innerR*Math.cos(startAngle), iy1=cy+innerR*Math.sin(startAngle);
    const ix2=cx+innerR*Math.cos(endAngle), iy2=cy+innerR*Math.sin(endAngle);
    const largeArc = angle > Math.PI ? 1 : 0;
    const color = colors[label]||'#bbb';
    const clickAttr = clickHandler ? ` style="cursor:pointer;" onclick="${clickHandler}('${label}')"` : '';
    slices += `<path d="M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} L${ix2},${iy2} A${innerR},${innerR} 0 ${largeArc},0 ${ix1},${iy1} Z" fill="${color}" stroke="white" stroke-width="2"${clickAttr}/>`;
    startAngle = endAngle;
  });
  const legend = entries.map(([label,val])=>`
    <div class="pie-legend-item"${clickHandler?` style="cursor:pointer;" onclick="${clickHandler}('${label}')"`:''}>
      <div class="pie-legend-dot" style="background:${colors[label]||'#bbb'}"></div>
      <span class="pie-legend-label">${label}</span>
      <span class="pie-legend-val">${val}件 ${Math.round(val/sum*100)}%</span>
    </div>`).join('');
  el.innerHTML = `<div class="pie-wrap">
    <div class="pie-canvas-wrap">
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${slices}
        <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">${sum}</text>
        <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="10" fill="#aaa">總案件</text>
      </svg>
    </div>
    <div class="pie-legend">${legend}</div>
  </div>`;
}

function getDeviceFingerprint() {
  const ua = navigator.userAgent;
  const lang = navigator.language || '';
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
  const screen = `${window.screen.width}x${window.screen.height}x${window.screen.colorDepth}`;
  const raw = [ua, lang, tz, screen].join('|');
  let hash = 0;
  for (let i = 0; i < raw.length; i++) {
    hash = ((hash << 5) - hash) + raw.charCodeAt(i);
    hash |= 0;
  }
  return 'FP' + Math.abs(hash).toString(16).toUpperCase().padStart(8,'0');
}

function downloadBackup() {
  if (!allCases || !allCases.length) { showToast('沒有可備份的資料'); return; }
  const payload = {
    exportedAt: new Date().toISOString(),
    count: allCases.length,
    cases: allCases
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date();
  const stamp = `${ts.getFullYear()}${String(ts.getMonth()+1).padStart(2,'0')}${String(ts.getDate()).padStart(2,'0')}_${String(ts.getHours()).padStart(2,'0')}${String(ts.getMinutes()).padStart(2,'0')}`;
  a.href = url;
  a.download = `渴望園區報修系統_備份_${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✓ 備份已下載');
}

async function importBackup(file) {
  if (!file) return;
  if (!confirm('匯入備份將會把檔案內的所有案件還原到系統，可能與現有資料合併或覆蓋，確定要繼續嗎？')) {
    document.getElementById('backupFileInput').value = '';
    return;
  }
  try {
    const text = await file.text();
    const payload = JSON.parse(text);
    const cases = Array.isArray(payload) ? payload : payload.cases;
    if (!Array.isArray(cases) || !cases.length) { showToast('備份檔案格式錯誤或無資料'); return; }
    showToast('匯入中，請稍候…');
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action:'import', cases, token: sessionStorage.getItem('adminToken') })
    });
    const data = await res.json();
    if (data.success) {
      const skipMsg = data.skipped ? `，略過重複 ${data.skipped} 筆` : '';
      showToast('✓ 匯入完成，新增 '+data.imported+' 筆'+skipMsg);
      await loadCases();
    } else {
      showToast('匯入失敗：'+(data.message||'未知錯誤'));
    }
  } catch(e) {
    showToast('匯入失敗，檔案格式錯誤或連線問題');
  }
  document.getElementById('backupFileInput').value = '';
}

function renderDashboard() {
  const cases = getFilteredCases();
  dashboardCases = cases;
  const total=cases.length, pending=cases.filter(c=>c.status==='待處理').length, done=cases.filter(c=>c.status==='已結案').length;
  document.getElementById('d-total').textContent=total;
  document.getElementById('d-pending').textContent=pending;
  document.getElementById('d-done').textContent=done;
  document.getElementById('d-rate').textContent=total>0?Math.round(done/total*100)+'%':'—';

  const areaCounts={};
  cases.forEach(c=>{areaCounts[effArea(c)]=(areaCounts[effArea(c)]||0)+1;});
  renderPieChart('areaChart', areaCounts, AREA_COLORS, total, 'drillByArea');

  const areaF=currentAreaDashFilter;
  const locCases=areaF==='all'?cases:cases.filter(c=>areaMatchesFilter(effArea(c),areaF));
  const locMap={};
  locCases.forEach(c=>{
    const loc=c.normalizedLocation||normalizeLocation(c.location)||'（未填位置）';
    const key=c.area+'|'+loc;
    if(!locMap[key]) locMap[key]={area:c.area,loc,total:0,pending:0,done:0,cases:[]};
    locMap[key].total++; if(c.status==='待處理') locMap[key].pending++; else locMap[key].done++;
    locMap[key].cases.push(c);
  });
  const locEntries=Object.values(locMap).sort((a,b)=>b.total-a.total);
  locPagerMultiArea = new Set(locEntries.map(e=>e.area)).size > 1;
  locPagerMaxL=Math.max(...locEntries.map(e=>e.total),1);
  locPagerEntries = locEntries;
  locPagerPage = 0;
  renderLocPage();

  const locTypeColors = {'客房':'#E8761A','辦公室':'#E8761A','餐廳':'#3B82F6','設施':'#8B5CF6','公共區域／其他':'#aaa'};
  const locTypeCounts = {};
  cases.forEach(c=>{
    const lt = c.correctedLocType || c.locationType || '';
    if (lt) locTypeCounts[lt]=(locTypeCounts[lt]||0)+1;
  });
  renderPieChart('locTypeChart', locTypeCounts, locTypeColors, total, 'drillByLocType');

  const typeColors = {'給排水':'#06B6D4','電力':'#F59E0B','消防':'#EF4444','空調':'#3B82F6','弱電':'#8B5CF6','電梯':'#EC4899','建物':'#10B981','木工':'#A0522D','鐵工':'#6B7280','照明':'#F97316','衛浴':'#14B8A6','庶務':'#A78BFA','其他':'#aaa'};
  const typeCounts = {};
  const closedForType = cases.filter(c=>c.status==='已結案');
  closedForType.forEach(c=>{ const ct=normalizeCaseType(c.caseType); if(ct) typeCounts[ct]=(typeCounts[ct]||0)+1; });
  renderPieChart('caseTypeChart', typeCounts, typeColors, closedForType.length, 'drillByCaseType');

  // 結案人比例圖（限定密碼 py5678 才顯示）
  const closerChartWrap = document.getElementById('closerChartWrap');
  if (sessionStorage.getItem('adminToken') === 'py5678') {
    closerChartWrap.style.display = '';
    const closerColors = {};
    const palette = ['#E8761A','#1a3a5c','#2D7A3E','#8B5CF6','#EC4899','#06B6D4','#F59E0B','#14B8A6'];
    const closedCases = cases.filter(c=>c.status==='已結案' && c.closerName);
    const closerCounts = {};
    closedCases.forEach(c=>{ closerCounts[c.closerName]=(closerCounts[c.closerName]||0)+1; });
    Object.keys(closerCounts).forEach((name,i)=>{ closerColors[name]=palette[i%palette.length]; });
    renderPieChart('closerChart', closerCounts, closerColors, closedCases.length, 'drillByCloser');
  } else {

function setExportRange(range, btn) {
  exportRange = range;
  document.querySelectorAll('.export-range-btn').forEach(b => b.classList.remove('active-export'));
  btn.classList.add('active-export');
  document.getElementById('exportCustomRange').style.display = range === 'custom' ? 'block' : 'none';
}

function getExportCases() {
  const now = new Date();
  let cases = allCases.filter(c => !c.flagReason);
  if (exportRange === 'month') {
    cases = cases.filter(c => {
      const d = parseExportDate(c.datetime);
      return d && d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    });
  } else if (exportRange === '3month') {
    cases = cases.filter(c => {
      const d = parseExportDate(c.datetime);
      return d && (now - d) <= 90*24*60*60*1000;
    });
  } else if (exportRange === 'custom') {
    const from = document.getElementById('exportDateFrom').value;
    const to = document.getElementById('exportDateTo').value;
    cases = cases.filter(c => {
      const d = parseExportDate(c.datetime);
      if (!d) return false;
      if (from && d < new Date(from)) return false;
      if (to && d > new Date(to + 'T23:59:59')) return false;
      return true;
    });
  }
  return cases;
}

function parseExportDate(raw) {
  if (!raw) return null;
  const m = String(raw).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  const d = new Date(raw);
  return isNaN(d) ? null : d;
}

async function exportExcel() {
  const btn = document.getElementById('exportBtn');
  btn.textContent = '產生中…'; btn.disabled = true;

  const cases = getExportCases();
  const includeDetail = document.getElementById('exportIncludeDetail').checked;
  const now = new Date();
  const rangeLabel = {month:'本月', '3month':'近三個月', all:'全部'}[exportRange] || (() => {
    const from = document.getElementById('exportDateFrom').value;
    const to = document.getElementById('exportDateTo').value;
    const fmt = s => s ? s.replace(/-/g,'/') : '';
    return from || to ? `${fmt(from)} ～ ${fmt(to)}` : '自訂';
  })();

  const total = cases.length;
  const pending = cases.filter(c => c.status === '待處理').length;
  const done = cases.filter(c => c.status === '已結案').length;
  const rate = total > 0 ? Math.round(done/total*100) : 0;

  // 各棟統計
  const areaMap = {};
  cases.forEach(c => {
    const a = effArea(c);
    if (!areaMap[a]) areaMap[a] = {total:0, done:0, pending:0};
    areaMap[a].total++;
    if (c.status==='已結案') areaMap[a].done++; else areaMap[a].pending++;
  });
  const areas = Object.entries(areaMap)
    .sort((a,b)=>b[1].total-a[1].total)
    .map(([name, stat]) => ({
      name, total: stat.total, done: stat.done, pending: stat.pending,
      rate: stat.total>0 ? Math.round(stat.done/stat.total*100) : 0
    }));

  // 維修類別（已結案）
  const typeCounts = {};
  cases.filter(c=>c.status==='已結案').forEach(c => {
    const ct = normalizeCaseType(c.caseType);
    if (ct) typeCounts[ct] = (typeCounts[ct]||0)+1;
  });
  const types = Object.entries(typeCounts)
    .sort((a,b)=>b[1]-a[1])
    .map(([name, cnt]) => ({name, cnt}));

  // 前10名未結案件（依等待天數）
  const exportNow = new Date();
  const pendingTop = allCases
    .filter(c => c.status === '待處理' && !c.flagReason)
    .map(c => {
      const d = parseDate(c.datetime || c.date);
      const daysWait = d ? Math.floor((exportNow - d) / 86400000) : 0;
      return { c, daysWait };
    })
    .sort((a,b) => b.daysWait - a.daysWait)
    .slice(0, 10)
    .map((e,i) => ({
      rank: i+1,
      loc: effArea(e.c)+' · '+(e.c.normalizedLocation||e.c.location||''),
      days: e.daysWait,
      date: e.c.datetime||e.c.date||'',
      desc: e.c.description||''
    }));

  // 案件明細
  const detail = includeDetail ? cases.map(c => ({
    caseId: c.caseId, datetime: c.datetime, unit: c.unit, name: c.name,
    area: effArea(c), locationType: c.locationType, location: c.location||'',
    description: c.description, status: c.status, repairNote: c.repairNote||'',
    caseType: normalizeCaseType(c.caseType)||'', closerName: c.closerName||''
  })) : [];

  const stats = { rangeLabel, total, pending, done, rate, areas, types, pendingTop, detail };

  try {
    const data = await callApi({ action: 'generateExcelReport', stats });
    if (data.success) {
      const a = document.createElement('a');
      a.href = data.url;
      a.download = data.fileName || 'report.xlsx';
      a.target = '_blank';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      closeExportModal();
      showToast('✓ 報告已下載');
    } else {
      showToast('生成失敗：'+(data.message||'未知錯誤'));
    }
  } catch(e) {
    showToast('生成失敗，請檢查網路');
  }

  btn.textContent = '下載 Excel'; btn.disabled = false;
}

function compressImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    // 原始檔案過大時直接提示，避免瀏覽器處理超大圖片卡死
    const MAX_RAW_MB = 15;
    if (file.size > MAX_RAW_MB * 1024 * 1024) {
      reject(new Error('FILE_TOO_LARGE'));
      return;
    }
    const reader = new FileReader();
    const timeout = setTimeout(() => reject(new Error('TIMEOUT')), 15000);
    reader.onerror = () => { clearTimeout(timeout); reject(new Error('READ_ERROR')); };
    reader.onload = e => {
      const img = new Image();
      img.onerror = () => { clearTimeout(timeout); reject(new Error('IMAGE_ERROR')); };
      img.onload = () => {
        clearTimeout(timeout);
        let w = img.width, h = img.height;
        if (w > maxSize || h > maxSize) {
          if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
          else { w = Math.round(w * maxSize / h); h = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

}

// 依道具實際數值動態產生說明文字，避免buff後數值跟文字對不上
function sgFormatItemDesc(item) {
  switch(item.type) {
    case 'globalRate':      return `全體產能永久+${(item.value*100).toFixed(1)}%`;
    case 'globalClick':     return `全體點擊力永久+${(item.value*100).toFixed(1)}%`;
    case 'instantXp':       return `立即獲得大量薪水`;
    case 'autoClickBonus':  return `自動點擊永久+${item.value.toFixed(2)}次/秒`;
    case 'critMultBonus':   return `會心倍率永久+${item.value.toFixed(2)}倍`;
    case 'critBonus':       return `會心機率永久+${item.value.toFixed(1)}%`;
    case 'hourglass':       return `連擊時間窗永久+${(item.value/1000).toFixed(1)}秒，且全體產能與點擊力永久+${(item.compoundPct*100).toFixed(0)}%`;
    case 'offlineMult':     return `離線效率永久+${(item.value*100).toFixed(0)}%`;
    case 'offlineHrBonus':  return `離線收益上限永久+${item.value.toFixed(1)}小時`;
    case 'dropRateBonus':   return `寶箱掉落機率永久+${(item.value*100).toFixed(2)}%`;
    case 'luckySpawnBonus': return `幸運史萊姆出現機率永久+${(item.value*100).toFixed(0)}%`;
    case 'crystalInstant':  return `立即獲得 ${Math.round(item.value)} 水晶`;
    case 'techPowerInstant':return `立即獲得 ${Math.round(item.value)} 技術力`;
    case 'auraEnergyInstant':return `立即獲得 ${Math.round(item.value)} 辦公家具`;
    case 'dailyRewardBonus':return `每日任務水晶獎勵永久+${(item.value*100).toFixed(0)}%`;
    case 'crystalGainBonus':return `重新入職水晶量永久+${(item.value*100).toFixed(0)}%`;
    case 'comboWindowBonus':return `連擊時間窗永久+${(item.value/1000).toFixed(2)}秒`;
    case 'comboCapBonus':   return `連擊加成上限永久+${(item.value*100).toFixed(0)}%`;
  }
  return item.desc;
}

// 道具稀有度倍率：既然道具難拿(尤其傳說級)，數值大幅提升才對得起稀有度
const SG_ITEM_RARITY_BUFF = { common:1.6, rare:2.5, legendary:4.0 };
SG_GLOBAL_ITEMS.forEach(item => {
  const mult = SG_ITEM_RARITY_BUFF[item.rarity];
  item.value = item.value * mult;
  if (item.compoundPct !== undefined) item.compoundPct = item.compoundPct * mult;
  item.desc = sgFormatItemDesc(item);
});

function sgEquipBonus(type) {
  let sum = 0;
  SG_GEAR.forEach(g => {
    const lv = (sg.gearLv && sg.gearLv[g.id]) || 0;
    if (!lv) return;
    g.bonuses.forEach(b => { if (b.type===type) sum += b.value * lv; });
  });
  SG_CERTIFICATIONS.forEach(c => {
    const lv = (sg.certLv && sg.certLv[c.id]) || 0;
    if (!lv) return;
    c.bonuses.forEach(b => { if (b.type===type) sum += b.value * lv; });
  });
  SG_OFFICE_DECOR.forEach(o => {
    const lv = (sg.officeLv && sg.officeLv[o.id]) || 0;
    if (!lv) return;
    o.bonuses.forEach(b => { if (b.type===type) sum += b.value * lv; });
  });
  SG_REAL_ESTATE.forEach(p => {
    const lv = (sg.propertyLv && sg.propertyLv[p.id]) || 0;
    if (!lv) return;
    p.bonuses.forEach(b => { if (b.type===type) sum += b.value * lv; });
  });
  return sum;
}

// 4組視覺特效分級：1-5基層／6-10中階主管／11-15高階主管／16-20集團高層
function sgJobRankTier(rank) {
  if (rank <= 5) return 1;
  if (rank <= 10) return 2;
  if (rank <= 15) return 3;
  return 4;
}

// 職級判定為三維複合條件：薪水、技術力、辦公家具必須同時達標才能晉升到該階
function sgRankMet(r) {
  return (sg.lifetimeXp||0) >= r.threshold && (sg.techPower||0) >= r.techReq && (sg.auraEnergy||0) >= r.auraReq && (sg.assets||0) >= r.assetReq;
}

function sgGetJobRank() {
  let current = SG_JOB_RANKS[0];
  for (const r of SG_JOB_RANKS) { if (sgRankMet(r)) current = r; }
  return current;
}

function sgJobRankProgress() {
  const current = sgGetJobRank();
  const idx = SG_JOB_RANKS.findIndex(r=>r.rank===current.rank);
  const next = SG_JOB_RANKS[idx+1];
  if (!next) return { current, next:null, pct:100 };
  const xpSpan = next.threshold - current.threshold;
  const xpDone = (sg.lifetimeXp||0) - current.threshold;
  const xpPct = Math.min(100, Math.max(0, Math.round(xpDone/xpSpan*100)));
  const techPct = next.techReq>0 ? Math.min(100, Math.round((sg.techPower||0)/next.techReq*100)) : 100;
  const auraPct = next.auraReq>0 ? Math.min(100, Math.round((sg.auraEnergy||0)/next.auraReq*100)) : 100;
  const assetPct = next.assetReq>0 ? Math.min(100, Math.round((sg.assets||0)/next.assetReq*100)) : 100;
  // 綜合進度取四者最小值：任何一項沒跟上，整體進度就卡在那一項
  const pct = Math.min(xpPct, techPct, auraPct, assetPct);
  return { current, next, pct, xpPct, techPct, auraPct, assetPct };
}

function sgJobRankHtml() {
  const { current, next, xpPct, techPct, auraPct, assetPct } = sgJobRankProgress();
  const tierLabel = {1:'基層', 2:'中階主管', 3:'高階主管', 4:'集團高層'}[sgJobRankTier(current.rank)];
  if (!next) {
    return `
      <div class="sg-job-rank-name">🏢 ${current.name}　<span class="sg-job-rank-tier">[${tierLabel}]</span></div>
      <div class="sg-job-rank-next" style="color:#E0A800;font-weight:800;">👑 已達到職涯巔峰！</div>
    `;
  }
  const missingParts = [];
  if (xpPct < 100) missingParts.push('薪水');
  if (techPct < 100) missingParts.push('技術力');
  if (auraPct < 100) missingParts.push('辦公家具');
  if (assetPct < 100) missingParts.push('資產');
  const hintText = missingParts.length
    ? `似乎還有進步空間：${missingParts.join('、')}尚未達標，繼續努力吧`
    : `即將迎來升遷的好消息…`;
  return `
    <div class="sg-job-rank-name">🏢 ${current.name}　<span class="sg-job-rank-tier">[${tierLabel}]</span></div>
    <div class="sg-job-rank-next">${hintText}</div>
  `;
}

// 檢查是否升職，回傳新職級(若無升職則回傳null)
function sgCheckJobPromotion() {
  const current = sgGetJobRank();
  if (current.rank > (sg.seenJobRank||1)) {
    sg.seenJobRank = current.rank;
    return current;
  }
  return null;
}

const SG_STOCK_BASE_COST = 100;      // 基礎成本(薪水)
const SG_STOCK_COST_MUL = 1.15;      // 連續遊玩每次成本上漲15%
const SG_STOCK_DECAY_SEC = 20;       // 每20秒未遊玩，熱度衰減1次

function sgStockHeatDecay() {
  const now = Date.now();
  const elapsed = (now - (sg.lastStockPlayTime||0)) / 1000;
  const decaySteps = Math.floor(elapsed / SG_STOCK_DECAY_SEC);
  if (decaySteps > 0) {
    sg.stockPlayCount = Math.max(0, (sg.stockPlayCount||0) - decaySteps);
    sg.lastStockPlayTime = now - (elapsed % SG_STOCK_DECAY_SEC) * 1000;
  }
}

function sgStockCost() {
  sgStockHeatDecay();
  const heatCost = SG_STOCK_BASE_COST * Math.pow(SG_STOCK_COST_MUL, sg.stockPlayCount||0);
  const salaryBasedCost = sg.xp * 0.0002; // 隨薪水規模成長的下限,避免後期成本形同虛設
  let cost = Math.max(heatCost, salaryBasedCost);
  // debuff期間額外加價：削弱越嚴重，加價越兇，避免賠了就立刻加倍下注翻本
  const debuffMult = sgStockDebuffMult();
  if (debuffMult < 1) {
    const deficit = 1 - debuffMult;
    cost *= (1 + deficit*3);
  }
  return Math.floor(cost);
}

// 股票debuff：暫時削弱產能/點擊力，打在「賺錢能力」而非「現有存款」，避免本金少時懲罰無感
function sgStockDebuffMult() {
  if (Date.now() < (sg.stockDebuffUntil||0)) return sg.stockDebuffMult || 1;
  return 1;
}

function sgStockDebuffSecondsLeft() {
  const left = Math.ceil(((sg.stockDebuffUntil||0) - Date.now()) / 1000);
  return left > 0 ? left : 0;
}

// 股票buff：贏面對稱效果，暫時提升產能/點擊力
function sgStockBuffMult() {
  if (Date.now() < (sg.stockBuffUntil||0)) return sg.stockBuffMult || 1;
  return 1;
}

function sgStockBuffSecondsLeft() {
  const left = Math.ceil(((sg.stockBuffUntil||0) - Date.now()) / 1000);
  return left > 0 ? left : 0;
}

// 動態水晶獎勵：取「隨機基礎值」與「重新入職預期量的一定比例」兩者較大值，確保獎勵隨進度成長不會被固定數字拖垮
function sgStockScaledCrystal(min, max, pct) {
  const randomFloor = min + Math.random()*(max-min);
  const scaled = sgPrestigeCrystalGain() * pct;
  return Math.floor(Math.max(randomFloor, scaled));
}

function sgRollStockOutcome() {
  const totalWeight = SG_STOCK_OUTCOMES.reduce((s,o)=>s+o.weight, 0);
  let r = Math.random() * totalWeight;
  for (const o of SG_STOCK_OUTCOMES) {
    if (r < o.weight) return o;
    r -= o.weight;
  }
  return SG_STOCK_OUTCOMES[0];
}

function sgPlayStock() {
  const cost = sgStockCost();
  if (sg.xp < cost) { showToast('薪水不足，無法上班看股票'); return; }
  sg.xp -= cost;
  sg.stockPlayCount = (sg.stockPlayCount||0) + 1;
  sg.lastStockPlayTime = Date.now();
  sg.stockPlays = (sg.stockPlays||0) + 1;

  const outcome = sgRollStockOutcome();
  let resultMsg = '';

  if (outcome.type === 'rateBonus') {
    const gain = Math.floor(sgEffRate() * outcome.seconds);
    sgAddXp(gain);
    resultMsg = `${outcome.label}！相當於${outcome.seconds}秒產能，薪水+${sgFormatNum(gain)}`;
  } else if (outcome.type === 'xpPct') {
    const delta = Math.floor(sg.xp * outcome.value);
    sg.xp = Math.max(0, sg.xp + delta);
    resultMsg = `${outcome.label}！薪水${delta>=0?'+':''}${sgFormatNum(delta)}`;
  } else if (outcome.type === 'crystalScaled') {
    const gain = sgStockScaledCrystal(outcome.min, outcome.max, outcome.pct);
    sg.crystals += gain;
    resultMsg = `${outcome.label}！獲得 ${sgFormatNum(gain)} 💠`;
  } else if (outcome.type === 'jackpot') {
    const crystalGain = sgStockScaledCrystal(outcome.min, outcome.max, outcome.pct);
    sg.crystals += crystalGain;
    const deptCount = Math.floor(outcome.deptMin + Math.random()*(outcome.deptMax-outcome.deptMin));
    const unlockedItems = SG_SHOP.filter(i=>sgIsShopItemUnlocked(i));
    let deptMsg = '';
    if (unlockedItems.length) {
      const pick = unlockedItems[Math.floor(Math.random()*unlockedItems.length)];
      sg.owned[pick.id] = (sg.owned[pick.id]||0) + deptCount;
      deptMsg = `　免費「${pick.name.replace(/^\S+\s/,'')}」x${deptCount}`;
    }
    resultMsg = `🎉 ${outcome.label}！獲得 ${sgFormatNum(crystalGain)} 💠${deptMsg}`;
  } else if (outcome.type === 'deptGift') {
    const unlockedItems = SG_SHOP.filter(i=>sgIsShopItemUnlocked(i));
    const deptCount = Math.floor(outcome.min + Math.random()*(outcome.max-outcome.min));
    if (unlockedItems.length) {
      const pick = unlockedItems[Math.floor(Math.random()*unlockedItems.length)];
      sg.owned[pick.id] = (sg.owned[pick.id]||0) + deptCount;
      resultMsg = `${outcome.label}！免費獲得「${pick.name.replace(/^\S+\s/,'')}」x${deptCount}`;
    } else {
      resultMsg = `${outcome.label}！但目前尚無可加碼的部門`;
    }
  } else if (outcome.type === 'deptLoss') {
    const ownedItems = SG_SHOP.filter(i => (sg.owned[i.id]||0) > 0);
    if (ownedItems.length) {
      const pick = ownedItems[Math.floor(Math.random()*ownedItems.length)];
      const current = sg.owned[pick.id];
      const lose = Math.max(1, Math.floor(current * outcome.pct));
      sg.owned[pick.id] = Math.max(0, current - lose);
      resultMsg = `${outcome.label}！「${pick.name.replace(/^\S+\s/,'')}」裁撤 -${lose}`;
    } else {
      resultMsg = `${outcome.label}！但目前尚無部門可裁撤，逃過一劫`;
    }
  }

  // debuff：取「更嚴重」的倍率與「更晚」的到期時間，避免被新一輪較輕的結果洗掉
  if (outcome.debuffMult) {
    const now = Date.now();
    const currentlyActive = now < (sg.stockDebuffUntil||0);
    const newUntil = now + outcome.debuffSec*1000;
    if (currentlyActive) {
      sg.stockDebuffMult = Math.min(sg.stockDebuffMult, outcome.debuffMult);
      sg.stockDebuffUntil = Math.max(sg.stockDebuffUntil, newUntil);
    } else {
      sg.stockDebuffMult = outcome.debuffMult;
      sg.stockDebuffUntil = newUntil;
    }
    resultMsg += `　產能/點擊力削弱${Math.round((1-sg.stockDebuffMult)*100)}%（還剩${sgStockDebuffSecondsLeft()}秒）`;
  }

  // buff：對稱debuff，取「更高」的倍率與「更晚」的到期時間
  if (outcome.buffMult) {
    const now = Date.now();
    const currentlyActive = now < (sg.stockBuffUntil||0);
    const newUntil = now + outcome.buffSec*1000;
    if (currentlyActive) {
      sg.stockBuffMult = Math.max(sg.stockBuffMult, outcome.buffMult);
      sg.stockBuffUntil = Math.max(sg.stockBuffUntil, newUntil);
    } else {
      sg.stockBuffMult = outcome.buffMult;
      sg.stockBuffUntil = newUntil;
    }
    resultMsg += `　產能/點擊力提升${Math.round((sg.stockBuffMult-1)*100)}%（還剩${sgStockBuffSecondsLeft()}秒）`;
  }

  sgSave();
  sgUpdateNumbers();
  document.getElementById('sgTabContent').innerHTML = sgTabContentHtml();
  showToast((outcome.tone==='good' ? '📈 ' : '📉 ') + resultMsg);
}

function sgStockTabHtml() {
  sgStockHeatDecay();
  const cost = sgStockCost();
  const canAfford = sg.xp >= cost;
  const heat = sg.stockPlayCount || 0;
  const debuffLeft = sgStockDebuffSecondsLeft();
  const buffLeft = sgStockBuffSecondsLeft();
  const rows = SG_STOCK_OUTCOMES.map(o => {
    const debuffDesc = o.debuffMult ? `　產能/點擊力-${Math.round((1-o.debuffMult)*100)}%(${o.debuffSec}秒)` : '';
    const buffDesc = o.buffMult ? `　產能/點擊力+${Math.round((o.buffMult-1)*100)}%(${o.buffSec}秒)` : '';
    const desc = o.type==='rateBonus' ? `相當於${o.seconds}秒產能的薪水${buffDesc}`
      : o.type==='xpPct' ? `薪水${o.value>0?'+':''}${Math.round(o.value*100)}%${debuffDesc}`
      : o.type==='crystalScaled' ? `+${o.min}~${o.max} 💠（隨進度成長，取重新入職預期量${Math.round(o.pct*100)}%）${buffDesc}`
      : o.type==='deptGift' ? `免費部門商品 +${o.min}~${o.max} 件${buffDesc}`
      : o.type==='deptLoss' ? `隨機部門商品裁撤 -${Math.round(o.pct*100)}%`
      : `+${o.min}~${o.max} 💠（隨進度成長）加碼免費部門商品${buffDesc}`;
    return `<div class="sg-stock-row ${o.tone}"><span>${o.label}（${o.weight}%）</span><span>${desc}</span></div>`;
  }).join('');
  return `
    <div class="sg-colleague-crystal-bar">✨ 薪水：${sgFormatNum(sg.xp)}　｜　💎 水晶：${sg.crystals}</div>
    ${debuffLeft>0?`<div class="sg-stock-debuff-alert">⚠️ 投資失利中：產能/點擊力削弱 ${Math.round((1-sg.stockDebuffMult)*100)}%，還剩 ${debuffLeft} 秒</div>`:''}
    ${buffLeft>0?`<div class="sg-stock-buff-alert">🎉 投資得利中：產能/點擊力提升 ${Math.round((sg.stockBuffMult-1)*100)}%，還剩 ${buffLeft} 秒</div>`:''}
    <div class="sg-stock-panel">
      <div class="sg-stock-title">📈 上班看股票</div>
      <div class="sg-stock-desc">花一點薪水賭一把，水晶/部門獎勵永遠沒有下檔風險；輸的話薪水小虧，且會暫時削弱產能/點擊力</div>
      <button class="sg-stock-btn" ${canAfford?'':'disabled'} onclick="sgPlayStock()">
        上班看股票　花費 ${sgFormatNum(cost)} ✨
      </button>
      <div class="sg-stock-heat">🔥 目前熱度 Lv.${heat}（連續遊玩成本上漲，${SG_STOCK_DECAY_SEC}秒未玩會冷卻）</div>
      <div class="sg-stock-stats">已上班看股票 ${sg.stockPlays||0} 次</div>
    </div>
    <div class="sg-section-label">🎲 賠率表（僅供參考，實際結果隨機）</div>
    <div class="sg-stock-table">${rows}</div>
  `;
}
